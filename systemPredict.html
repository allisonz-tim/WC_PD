<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Traffic Prediction Dashboard (PD-1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #e0e0e0; }
        .glass-panel { background: rgba(30, 30, 30, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-danger { color: #ff5252; text-shadow: 0 0 10px rgba(255, 82, 82, 0.5); }
        .status-warning { color: #fb8c00; text-shadow: 0 0 10px rgba(251, 140, 0, 0.5); }
        .status-normal { color: #4caf50; text-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <header class="w-full max-w-5xl mb-8 text-center md:text-left">
        <h1 class="text-3xl font-black tracking-tight text-white mb-2">系統容量與流量預測模型</h1>
        <p class="text-gray-400 text-sm">基於歷史極值與外部賽事推算</p>
    </header>

    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="glass-panel rounded-2xl p-6 lg:col-span-1 flex flex-col gap-6">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2">賽事變數設定 (Inputs)</h2>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">開賽時段 (Time Zone)</label>
                <select id="tz" class="w-full bg-[#2d2d2d] border border-gray-600 text-gray-100 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors">
                    <option value="1.5">黃金/晚間 (20:00 - 00:00)</option>
                    <option value="1.2">深夜 (00:01 - 03:00) </option>
                    <option value="1.0" selected>早晨/白天 (06:00 - 19:59) </option>
                    <option value="0.8">凌晨 (03:01 - 05:59) </option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">球隊熱度 (Team Tier)</label>
                <select id="team" class="w-full bg-[#2d2d2d] border border-gray-600 text-gray-100 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors">
                    <option value="1.3" selected>S級強隊 (法國/英格蘭/西班牙/阿根廷/葡萄牙)</option>
                    <option value="1.0">A級球隊（墨西哥/美國/挪威/摩洛哥/荷蘭/比利時/奧地利/克羅地亞/瑞士/哥倫比亞） </option>
                    <option value="0.7">B級球隊（科特迪瓦/瑞典/厄瓜多爾/剛果/塞內加爾/阿爾及利亞/澳洲/埃及） </option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">賽事階段 (Match Stage)</label>
                <select id="stage" class="w-full bg-[#2d2d2d] border border-gray-600 text-gray-100 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors">
                    <option value="1.0">小組賽 (Group)</option>
                    <option value="1.3" selected>32強 (Round of 32)</option>
                    <option value="1.4">16強 (Round of 16)</option>
                    <option value="1.6">準決賽/決賽 (Finals)</option>
                </select>
            </div>

            <div class="mt-auto pt-4 border-t border-gray-700">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">總權重乘數 (Multiplier):</span>
                    <span id="multiplier-display" class="text-2xl font-bold text-blue-400">1.00x</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col gap-6">
            
            <div class="glass-panel rounded-2xl p-6 relative overflow-hidden flex flex-col items-center justify-center min-h-[200px]">
                <h2 class="text-sm font-medium text-gray-400 uppercase tracking-widest mb-1">系統預估負載狀態</h2>
                <div id="status-text" class="text-4xl md:text-5xl font-black mt-2 transition-colors duration-300">NORMAL</div>
                <div class="w-full max-w-md mt-6 relative h-4 bg-gray-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="absolute top-0 left-0 h-full bg-green-500 transition-all duration-500 ease-out" style="width: 0%;"></div>
                    <div class="absolute top-0 left-[60%] h-full w-[2px] bg-yellow-500/50"></div> <!-- Warning Threshold -->
                    <div class="absolute top-0 left-[73.3%] h-full w-[2px] bg-red-500/50"></div>  <!-- Danger Threshold -->
                </div>
                <div class="w-full max-w-md mt-2 flex justify-between text-[10px] text-gray-500 font-mono">
                    <span>0 QPS</span>
                    <span>Warning (450k)</span>
                    <span>Danger (550k)</span>
                    <span>Max (750k+)</span>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="glass-panel rounded-2xl p-5 text-center">
                    <div class="text-xs text-gray-400 mb-1">預估最高活躍用戶</div>
                    <div id="metric-users" class="text-2xl font-bold text-white font-mono">0</div>
                </div>
                <div class="glass-panel rounded-2xl p-5 text-center border border-blue-500/30 bg-blue-900/10">
                    <div class="text-xs text-blue-300 mb-1">預估 Peak QPS</div>
                    <div id="metric-qps" class="text-3xl font-black text-blue-400 font-mono">0</div>
                </div>
                <div class="glass-panel rounded-2xl p-5 text-center">
                    <div class="text-xs text-gray-400 mb-1">預估最高分鐘單量</div>
                    <div id="metric-orders" class="text-2xl font-bold text-white font-mono">0</div>
                </div>
            </div>

            <div id="action-box" class="glass-panel rounded-2xl p-5 border-l-4 border-green-500 transition-colors duration-300">
                <h3 class="text-sm font-bold text-white mb-2 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                    SRE Action Plan
                </h3>
                <p id="action-text" class="text-sm text-gray-300 leading-relaxed">
                    系統負載預期在安全範圍內。維持常規監控即可。
                </p>
            </div>
        </div>
    </div>

    <script>
        const BASELINE = {
            users: 56760,
            qps: 35000,
            orders: 6966
        };

        const THRESHOLDS = {
            warning: 450000,
            danger: 550000,
            max_gauge: 750000 // For progress bar scaling
        };

        // DOM Elements
        const elTz = document.getElementById('tz');
        const elTeam = document.getElementById('team');
        const elStage = document.getElementById('stage');
        const elMultiplier = document.getElementById('multiplier-display');
        const elUsers = document.getElementById('metric-users');
        const elQps = document.getElementById('metric-qps');
        const elOrders = document.getElementById('metric-orders');
        const elStatus = document.getElementById('status-text');
        const elProgress = document.getElementById('progress-bar');
        const elActionBox = document.getElementById('action-box');
        const elActionText = document.getElementById('action-text');

        function formatNumber(num) {
            return Math.round(num).toLocaleString();
        }

        function calculate() {
            const tz = parseFloat(elTz.value);
            const team = parseFloat(elTeam.value);
            const stage = parseFloat(elStage.value);
            
            const multiplier = tz * team * stage;
            elMultiplier.textContent = multiplier.toFixed(2) + 'x';

            const predUsers = BASELINE.users * multiplier;
            const predQps = BASELINE.qps * multiplier * 10;
            const predOrders = BASELINE.orders * multiplier;

            elUsers.textContent = formatNumber(predUsers);
            elQps.textContent = formatNumber(predQps);
            elOrders.textContent = formatNumber(predOrders);

            // Update Status & Action Plan
            elStatus.classList.remove('status-normal', 'status-warning', 'status-danger');
            elProgress.classList.remove('bg-green-500', 'bg-yellow-500', 'bg-red-500');
            elActionBox.classList.remove('border-green-500', 'border-yellow-500', 'border-red-500');

            let pct = Math.min((predQps / THRESHOLDS.max_gauge) *100, 100);
            elProgress.style.width = `${pct}%`;

            if (predQps >= THRESHOLDS.danger) {
                elStatus.textContent = '🔴 DANGER: SCALE OUT';
                elStatus.classList.add('status-danger');
                elProgress.classList.add('bg-red-500');
                elActionBox.classList.add('border-red-500');
                //elActionText.innerHTML = '<strong>極限擴容警告：</strong> 預估 QPS 遠超紅線。<br/>1. 立即調高 <code>order-center</code> 與 <code>order-server</code> 的 HPA 上限。<br/>2. 確保 <code>match-server</code> 與 <code>market-server</code> 的 CPU Node 負載不超過 40%。<br/>3. 準備降級腳本：若 5xx 錯誤發生，立即關閉 <code>report-server</code> 歷史報表功能。';
            } else if (predQps >= THRESHOLDS.warning) {
                elStatus.textContent = '🟡 WARNING: MONITOR';
                elStatus.classList.add('status-warning');
                elProgress.classList.add('bg-yellow-500');
                elActionBox.classList.add('border-yellow-500');
                //elActionText.innerHTML = '<strong>警戒狀態：</strong> 系統負載將達到高位。<br/>1. 密切監控賽事完結時 <code>settle-center</code> 的 CPU/RAM 飆升情形。<br/>2. 檢查 `aggregator-server` 是否有資料積壓 (lag) 現象。';
            } else {
                elStatus.textContent = '🟢 NORMAL';
                elStatus.classList.add('status-normal');
                elProgress.classList.add('bg-green-500');
                elActionBox.classList.add('border-green-500');
                //elActionText.innerHTML = '系統負載預期在安全範圍內。維持常規監控即可。';
            }
        }

        // Attach listeners
        elTz.addEventListener('change', calculate);
        elTeam.addEventListener('change', calculate);
        elStage.addEventListener('change', calculate);

        // Initial calculation
        calculate();
    </script>
</body>
</html>
